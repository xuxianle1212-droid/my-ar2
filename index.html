<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍一拍 - AI中医全息交互终端</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root {
            --neon: #AEE31B;
            --glass-dark: rgba(0, 12, 6, 0.96);
            --bg-blur: blur(25px);
        }

        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', 'PingFang SC', sans-serif; color: white; }

        .header { 
            position: absolute; top: 0; width: 100%; height: 80px; 
            background: linear-gradient(to bottom, rgba(0,0,0,1) 30%, transparent);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .header h1 { margin: 0; letter-spacing: 12px; font-weight: 200; font-size: 28px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        .symptom-panel {
            position: absolute; right: 25px; top: 110px; width: 280px;
            z-index: 110; display: flex; flex-direction: column; gap: 12px;
        }
        .symptom-btn {
            background: var(--glass-dark); backdrop-filter: var(--bg-blur);
            border: 1px solid rgba(174, 227, 27, 0.5); padding: 16px;
            border-radius: 12px; cursor: pointer; transition: all 0.3s;
            color: #fff; line-height: 1.5; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .btn-title { color: var(--neon); font-weight: bold; display: block; font-size: 16px; margin-bottom: 4px; text-shadow: 1px 1px 3px #000; }
        .btn-desc { font-size: 13px; opacity: 0.9; color: #ddd; text-shadow: 1px 1px 2px #000; }
        
        .symptom-btn:hover { border-color: var(--neon); transform: translateX(-5px); }
        .symptom-btn.active { background: var(--neon); border-color: var(--neon); }
        .symptom-btn.active .btn-title, .symptom-btn.active .btn-desc { color: #000; text-shadow: none; }

        #detail-card {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(250%);
            width: 460px; background: rgba(0, 12, 6, 0.98); border: 1.5px solid var(--neon);
            padding: 30px; border-radius: 24px; backdrop-filter: blur(40px);
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1); z-index: 200;
        }
        #detail-card.show { transform: translateX(-50%) translateY(0); }
        .card-header { border-bottom: 1px solid rgba(174, 227, 27, 0.2); padding-bottom: 15px; margin-bottom: 15px; }
        .card-title { color: var(--neon); font-size: 26px; font-weight: bold; display: flex; align-items: center; gap: 12px; }
        .card-title::before { content: ''; width: 4px; height: 26px; background: var(--neon); }
        .card-row { margin-bottom: 12px; font-size: 15px; line-height: 1.6; color: #fff; }
        .row-label { color: var(--neon); font-weight: bold; margin-right: 10px; opacity: 0.9; }

        #output_canvas { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; }
        #input_video { display: none; }
    </style>
</head>
<body onclick="hideCard()">

<div class="header"><h1>拍一拍</h1></div>

<div class="symptom-panel">
    <div class="symptom-btn" onclick="selectSymptom('eye', this, event)">
        <span class="btn-title">眼部问题识别</span>
        <span class="btn-desc">干涩、酸胀、模糊、黑眼圈</span>
    </div>
    <div class="symptom-btn" onclick="selectSymptom('head', this, event)">
        <span class="btn-title">头部问题识别</span>
        <span class="btn-desc">偏头痛、太阳穴痛、头晕</span>
    </div>
    <div class="symptom-btn" onclick="selectSymptom('sleep', this, event)">
        <span class="btn-title">睡眠问题识别</span>
        <span class="btn-desc">入睡困难、多梦、醒后累</span>
    </div>
    <div class="symptom-btn" onclick="selectSymptom('neck', this, event)">
        <span class="btn-title">肩颈酸痛识别</span>
        <span class="btn-desc">风池穴、天柱穴、颈夹脊穴</span>
    </div>
    <div class="symptom-btn" onclick="selectSymptom('reset', this, event)" style="opacity:0.5; border-style:dashed;">重置识别</div>
</div>

<div id="detail-card" onclick="event.stopPropagation()">
    <div class="card-header"><div class="card-title" id="p-name">穴位名称</div></div>
    <div class="card-body">
        <div class="card-row"><span class="row-label">[ 定位 ]</span><span id="p-loc"></span></div>
        <div class="card-row"><span class="row-label">[ 手法 ]</span><span id="p-method"></span></div>
        <div class="card-row"><span class="row-label">[ 功效 ]</span><span id="p-eff"></span></div>
    </div>
</div>

<video id="input_video" playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let selectedType = 'reset';
    let lastResults = null;

    const ACUPOINTS = [
        { category:['eye'], name: "睛明", index: 133, loc: "眼内角稍上方凹陷处", method: "食指轻按，不打圈，轻压30秒×2次", eff: "缓解眼干、视疲劳，改善视力模糊" },
        { category:['eye'], name: "攒竹", index: 55, loc: "眉头内侧凹陷（眉毛起点）", method: "拇指或食指轻按+小幅打圈，1分钟", eff: "缓解眼酸胀、眉骨紧张" },
        { category:['eye'], name: "四白", index: 101, loc: "瞳孔正下方约一指处", method: "食指轻按，避免用力过大，30秒×2", eff: "改善黑眼圈、眼袋，促进眼周循环" },
        { category:['eye','head'], name: "太阳穴", index: 21, loc: "眉梢与眼角延长线外侧凹陷", method: "中指顺时针打圈按摩1分钟", eff: "缓解眼疲劳、止头痛、减轻胀痛" },
        { category:['head','sleep'], name: "百会", index: 10, loc: "头顶正中（前发际正中直上）", method: "中指垂直按压+缓慢放松，1分钟", eff: "提神醒脑、缓解头晕；调节神经，改善睡眠" },
        { category:['sleep','head'], name: "印堂", index: 9, loc: "两眉中间", method: "食指轻按+顺时针打圈1分钟", eff: "安神、缓解焦虑、帮助入睡" },
        
        // 颈部点位：Index 172 (风池-高)、Index 127 (安眠-侧)、Index 152 (天柱-中)、Index 200 (颈夹脊-低)
        { category:['eye','head','sleep','neck'], name: "风池", index: 172, loc: "后颈发际线两侧凹陷处（映射至颈侧上缘）", method: "双手拇指向内上方顶按1分钟", eff: "改善眼干、头晕、通络止痛" },
        { category:['sleep'], name: "安眠", index: 127, loc: "耳垂后方的骨头（乳突）与后颈风池穴之间的中点，偏上约一指处的凹陷", method: "食指或拇指轻按+慢揉1–2分钟", eff: "助眠核心穴，缓解失眠、多梦" },
        { category:['head','neck'], name: "天柱", index: 152, align: "left", isNeck: true, loc: "后颈部发际线处，颈椎两侧大筋（斜方肌外缘）外侧约一指的凹陷", method: "拇指向上推按1分钟", eff: "缓解头重、颈紧引起的头痛" },
        { category:['neck'], name: "颈夹脊穴", index: 200, isNeck: true, loc: "颈椎（后颈正中骨头）两侧，各旁开约一指（0.5–1寸）的一条纵向穴位带", method: "双手食中指并拢，沿颈椎两侧上下推揉1分钟", eff: "缓解颈部僵硬，改善上肢麻木" }
    ];

    function selectSymptom(type, btn, event) {
        event.stopPropagation();
        selectedType = type;
        document.querySelectorAll('.symptom-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        hideCard();
    }

    function hideCard() {
        document.getElementById('detail-card').classList.remove('show');
    }

    function onResults(results) {
        lastResults = results;
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.faceLandmarks) {
            ACUPOINTS.forEach(p => {
                const lm = results.faceLandmarks[p.index];
                if (lm) {
                    const active = selectedType === 'reset' || p.category.includes(selectedType);
                    drawPoint(lm, p, active);
                }
            });
        }
        canvasCtx.restore();
    }

    function drawPoint(lm, data, active) {
        const x = lm.x * canvasElement.width;
        const y = lm.y * canvasElement.height;
        const time = Date.now() / 1000;

        if (active) {
            canvasCtx.beginPath();
            canvasCtx.arc(x, y, 6 + (time % 1) * 8, 0, Math.PI * 2);
            canvasCtx.strokeStyle = `rgba(174, 227, 27, ${1 - (time % 1)})`;
            canvasCtx.lineWidth = 1;
            canvasCtx.stroke();
            canvasCtx.fillStyle = "#AEE31B";
        } else {
            canvasCtx.fillStyle = "rgba(255,255,255,0.25)";
        }

        canvasCtx.beginPath();
        canvasCtx.arc(x, y, active ? 4 : 1.5, 0, Math.PI * 2);
        canvasCtx.fill();

        if (active) {
            canvasCtx.save();
            canvasCtx.translate(x, y);
            canvasCtx.scale(-1, 1);
            canvasCtx.fillStyle = "white";
            canvasCtx.font = "bold 13px Arial";
            canvasCtx.shadowBlur = 4;
            canvasCtx.shadowColor = "black";

            if (data.align === "left") {
                canvasCtx.textAlign = "right";
                canvasCtx.fillText(data.name, -10, 5);
            } else {
                canvasCtx.textAlign = "left";
                canvasCtx.fillText(data.name, 10, 5);
            }
            canvasCtx.restore();
        }
    }

    // 交互逻辑优化
    canvasElement.addEventListener('click', (e) => {
        if (!lastResults || !lastResults.faceLandmarks) return;
        e.stopPropagation();
        const rect = canvasElement.getBoundingClientRect();
        const clickX = 1 - (e.clientX - rect.left) / rect.width;
        const clickY = (e.clientY - rect.top) / rect.height;

        let selectedPoint = null;
        let minDistance = 1.0; 

        ACUPOINTS.forEach(p => {
            const lm = lastResults.faceLandmarks[p.index];
            if (lm) {
                const dist = Math.hypot(clickX - lm.x, (clickY - lm.y) * (rect.height/rect.width));
                // 颈部穴位感应范围扩大至 0.04，其他穴位 0.025
                const threshold = p.isNeck ? 0.04 : 0.025; 
                
                if (dist < threshold && dist < minDistance) {
                    minDistance = dist;
                    selectedPoint = p;
                }
            }
        });

        if (selectedPoint) {
            document.getElementById('p-name').innerText = selectedPoint.name;
            document.getElementById('p-loc').innerText = selectedPoint.loc;
            document.getElementById('p-method').innerText = selectedPoint.method;
            document.getElementById('p-eff').innerText = selectedPoint.eff;
            document.getElementById('detail-card').classList.add('show');
        } else {
            hideCard();
        }
    });

    const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
    holistic.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    holistic.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await holistic.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
