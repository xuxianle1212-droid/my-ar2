<html lang="zh-CN">

    <meta charset="UTF-8">

    <title>拍一拍 - AI中医全息交互终端</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>

    <style>
        :root {
            --neon: #AEE31B;
            --panel-bg: rgba(0, 0, 0, 0.75); /* 加深背景，确保文字清晰 */
            --glass: rgba(174, 227, 27, 0.1);
        }

        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: white; }

        /* 顶部标题 */
        .header { 
            position: absolute; top: 0; width: 100%; height: 80px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .header h1 { margin: 0; letter-spacing: 12px; font-weight: 200; font-size: 28px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        /* 右侧面板 - 增强对比度 */
        .symptom-panel {
            position: absolute; right: 25px; top: 110px; width: 210px;
            z-index: 110; display: flex; flex-direction: column; gap: 12px;
        }
        .panel-label { color: var(--neon); font-size: 11px; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        
        .symptom-btn {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(174, 227, 27, 0.4); 
            padding: 16px 20px;
            border-radius: 10px; cursor: pointer; transition: all 0.3s;
            font-size: 16px; color: #fff; font-weight: 500;
            text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .symptom-btn:hover { border-color: var(--neon); background: rgba(174, 227, 27, 0.15); transform: translateX(-5px); }
        .symptom-btn.active { border-color: var(--neon); background: rgba(174, 227, 27, 0.25); box-shadow: 0 0 20px rgba(174, 227, 27, 0.3); }
