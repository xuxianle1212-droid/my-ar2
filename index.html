<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍一拍 - AI中医全息交互终端</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root {
            --neon: #AEE31B;
            --glass-dark: rgba(0, 10, 5, 0.9);
            --bg-blur: blur(15px);
        }

        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', 'PingFang SC', sans-serif; color: white; }

        .header { 
            position: absolute; top: 0; width: 100%; height: 80px; 
            background: linear-gradient(to bottom, rgba(0,0,0,1), transparent);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .header h1 { margin: 0; letter-spacing: 15px; font-weight: 200; font-size: 30px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        /* 右侧面板：加深对比，增强辨识度 */
        .symptom-panel {
            position: absolute; right: 25px; top: 110px; width: 260px;
            z-index: 110; display: flex; flex-direction: column; gap: 12px;
        }
        .symptom-btn {
            background: var(--glass-dark); backdrop-filter: var(--bg-blur);
            border: 1px solid rgba(174, 227, 27, 0.5); padding: 16px;
            border-radius: 12px; cursor: pointer; transition: all 0.3s;
            font-size: 15px; color: #fff; line-height: 1.4;
            text-shadow: 1px 1px 2px #000; /* 文字黑色描边 */
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }
        .btn-title { color: var(--neon); font-weight: bold; margin-bottom: 4px; display: block; font-size: 16px; }
        .symptom-btn:hover { border-color: var(--neon); transform: translateX(-5px); background: rgba(174, 227, 27, 0.1); }
        .symptom-btn.active { background: var(--neon); border-color: var(--neon); }
        .symptom-btn.active .btn-title, .symptom-btn.active { color: #000; text-shadow: none; font-weight: bold; }

        /* 详情卡片 */
        #detail-card {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%) translateY(250%);
            width: 440px; background: rgba(0, 15, 5, 0.98); border: 2px solid var(--neon);
            padding: 25px; border-radius: 20px; backdrop-filter: blur(25px);
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1); z-index: 200;
        }
        #detail-card.show { transform: translateX(-50%) translateY(0); }
        .card-title { color: var(--neon); font-size: 26px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .card-title::before { content: ''; width: 5px; height: 26px; background: var(--neon); }
        .card-body { font-size: 16px; line-height: 1.7; color: #eee; }

        #output_canvas { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; cursor: crosshair; }
        #input_video { display: none; }
        
        /* 扫描动画 */
        .scanning-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(174, 227, 27, 0.05) 0%, transparent 50%, rgba(174, 227, 27, 0.05) 100%);
            background-size: 100% 12px; animation: scan-anim 5s linear infinite;
            pointer-events: none; z-index: 50;
        }
        @keyframes scan-anim { from { background-position: 0 0; } to { background-position: 0 100%; } }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div class="header"><h1>拍一拍</h1></div>
<div class="scanning-overlay"></div>

<div class="symptom-panel" id="panel">
    <div class="symptom-btn" onclick="selectSymptom('eye', this, event)">
        <span class="btn-title">眼部疲劳干涩</span>
        眼睛干涩、酸胀、黑眼圈
    </div>
    <div class="symptom-btn" onclick="selectSymptom('head', this, event)">
        <span class="btn-title">头部眩晕偏痛</span>
        偏头痛、太阳穴跳痛、沉重
    </div>
    <div class="symptom-btn" onclick="selectSymptom('sleep', this, event)">
        <span class="btn-title">入睡困难多梦</span>
        难入睡、易醒、醒后疲劳
    </div>
    <div class="symptom-btn" onclick="selectSymptom('neck', this, event)">
        <span class="btn-title">肩颈僵硬酸痛</span>
        脖子僵硬、肩膀酸痛
    </div>
    <div class="symptom-btn" onclick="selectSymptom('reset', this, event)" style="margin-top:10px; opacity:0.7; border-style:dashed;">
        重置全屏扫描识别
    </div>
</div>

<div id="detail-card" onclick="event.stopPropagation()">
    <div class="card-title" id="p-name">穴位名称</div>
    <div class="card-body">
        <div style="margin-bottom:12px;"><b style="color:var(--neon)">[ 导引定位 ]</b> <span id="p-loc"></span></div>
        <div><b style="color:var(--neon)">[ 智慧建议 ]</b> <span id="p-eff"></span></div>
    </div>
</div>

<video id="input_video" playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const THEME_COLOR = "#AEE31B"; 
    
    let selectedType = 'reset';
    let lastResults = null;

    const SYMPTOMS = {
        'eye': { points: ['攒竹', '鱼腰', '四白'], advise: '建议：深呼吸，用指腹轻点按，每次持续3分钟。' },
        'head': { points: ['太阳穴', '神庭', '印堂'], advise: '建议：顺时针按压太阳穴，配合向后推按神庭。' },
        'sleep': { points: ['安眠点', '印堂'], advise: '建议：睡前点按印堂及耳后安眠区，有助于宁心。' },
        'neck': { points: ['肩井'], advise: '建议：揉捏肩井穴，配合扩胸运动以松解筋膜。' },
        'reset': { points: [], advise: '' }
    };

    // 重新严谨校对的穴位索引及信息
    const ACUPOINTS = [
        { type:'eye', name: "攒竹", index: 55, loc: "眉头凹陷处", eff: "缓解眼睑瞤动、消除视疲劳" },
        { type:'eye', name: "鱼腰", index: 52, loc: "眉毛正中点", eff: "缓解目赤肿痛、眼部胀痛" },
        { type:'eye', name: "四白", index: 101, loc: "瞳孔直下眶下孔凹陷处", eff: "改善黑眼圈、疏风明目" },
        { type:'head', name: "太阳穴", index: 21, loc: "眉梢与目外眦之间向后一寸", eff: "缓解偏头痛、清脑明目" },
        { type:'head', name: "神庭", index: 10, loc: "前发际正中直上0.5寸", eff: "宁神醒脑、缓解眩晕" },
        { type:'head', name: "印堂", index: 9, loc: "两眉头连线中点", eff: "安神定惊、缓解前额痛" },
        { type:'sleep', name: "安眠点", index: 153, loc: "耳后凹陷与枕骨下缘附近", eff: "宁心安神、辅助改善睡眠" },
        { type:'neck', name: "肩井", isPose: true, index: 11, loc: "大椎与肩峰连线中点", eff: "主治肩背痹痛、项强" }
    ];

    function selectSymptom(type, btn, event) {
        event.stopPropagation(); // 防止触发body隐藏逻辑
        selectedType = type;
        document.querySelectorAll('.symptom-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        hideCard();
    }

    function handleGlobalClick(event) {
        // 点击空白处隐藏卡片
        if (!document.getElementById('detail-card').contains(event.target)) {
            hideCard();
        }
    }

    function hideCard() {
        document.getElementById('detail-card').classList.remove('show');
    }

    function onResults(results) {
        lastResults = results;
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.faceLandmarks) {
            drawCyberGrid(results.faceLandmarks);
            
            ACUPOINTS.forEach(p => {
                let lm = null;
                if (p.isPose && results.poseLandmarks) {
                    lm = results.poseLandmarks[p.index];
                } else if (!p.isPose && results.faceLandmarks) {
                    lm = results.faceLandmarks[p.index];
                }

                if (lm) {
                    const isActive = selectedType === 'reset' || SYMPTOMS[selectedType].points.includes(p.name);
                    drawPoint(lm, p, isActive);
                }
            });
        }
        canvasCtx.restore();
    }

    function drawCyberGrid(landmarks) {
        canvasCtx.beginPath();
        canvasCtx.strokeStyle = "rgba(174, 227, 27, 0.25)";
        canvasCtx.lineWidth = 0.5;
        [10, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 10].forEach((idx, i) => {
            const p = landmarks[idx];
            if(i === 0) canvasCtx.moveTo(p.x * canvasElement.width, p.y * canvasElement.height);
            else canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height);
        });
        canvasCtx.stroke();
    }

    function drawPoint(lm, data, active) {
        const x = lm.x * canvasElement.width;
        const y = lm.y * canvasElement.height;
        const time = Date.now() / 1000;

        if (active) {
            canvasCtx.beginPath();
            canvasCtx.arc(x, y, 10 + (time % 1) * 12, 0, Math.PI * 2);
            canvasCtx.strokeStyle = `rgba(174, 227, 27, ${1 - (time % 1)})`;
            canvasCtx.stroke();
            canvasCtx.fillStyle = THEME_COLOR;
        } else {
            canvasCtx.fillStyle = "rgba(255,255,255,0.2)";
        }

        canvasCtx.beginPath();
        canvasCtx.arc(x, y, active ? 6 : 2.5, 0, Math.PI * 2);
        canvasCtx.fill();

        if (active) {
            canvasCtx.save();
            canvasCtx.translate(x, y);
            canvasCtx.scale(-1, 1);
            canvasCtx.fillStyle = "white";
            canvasCtx.font = "bold 14px Arial";
            canvasCtx.fillText(data.name, 12, 5);
            canvasCtx.restore();
        }
    }

    // 交互核心：增加“最近点优先”逻辑，彻底修复误触
    canvasElement.addEventListener('click', (e) => {
        if (!lastResults) return;
        const rect = canvasElement.getBoundingClientRect();
        const clickX = 1 - (e.clientX - rect.left) / rect.width;
        const clickY = (e.clientY - rect.top) / rect.height;

        let closestPoint = null;
        let minDistance = 0.025; // 进一步缩小点击半径，提升精度

        ACUPOINTS.forEach(p => {
            let lm = null;
            if (p.isPose && lastResults.poseLandmarks) lm = lastResults.poseLandmarks[p.index];
            else if (!p.isPose && lastResults.faceLandmarks) lm = lastResults.faceLandmarks[p.index];

            if (lm) {
                const dist = Math.hypot(clickX - lm.x, (clickY - lm.y) * (rect.height / rect.width));
                if (dist < minDistance) {
                    minDistance = dist;
                    closestPoint = p;
                }
            }
        });

        if (closestPoint) {
            showDetail(closestPoint);
            e.stopPropagation();
        } else {
            hideCard();
        }
    });

    function showDetail(p) {
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-loc').innerText = p.loc;
        const modeAdvise = (selectedType !== 'reset' && SYMPTOMS[selectedType].points.includes(p.name))
                           ? SYMPTOMS[selectedType].advise 
                           : "建议：每日点按2-3次，力度以微酸胀感为宜。";
        document.getElementById('p-eff').innerText = p.eff + "。" + modeAdvise;
        document.getElementById('detail-card').classList.add('show');
    }

    const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
    holistic.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    holistic.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await holistic.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
