<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍一拍 - AI中医全息交互终端</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root {
            --neon: #AEE31B;
            --glass: rgba(238, 253, 224, 0.15);
            --bg-blur: blur(10px);
        }

        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: white; }

        /* 顶部标题：极简科技感 */
        .header { 
            position: absolute; top: 0; width: 100%; height: 70px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .header h1 { margin: 0; letter-spacing: 12px; font-weight: 200; font-size: 28px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        /* 右侧病症选择面板 - 磨砂玻璃效果 */
        .symptom-panel {
            position: absolute; right: 20px; top: 100px; width: 180px;
            z-index: 110; display: flex; flex-direction: column; gap: 15px;
        }
        .symptom-btn {
            background: var(--glass); backdrop-filter: var(--bg-blur);
            border: 1px solid rgba(174, 227, 27, 0.3); padding: 15px;
            border-radius: 12px; cursor: pointer; transition: all 0.3s;
            text-align: center; font-size: 14px; color: #EEFDE0;
        }
        .symptom-btn:hover { background: rgba(174, 227, 27, 0.2); border-color: var(--neon); transform: translateX(-5px); }
        .symptom-btn.active { background: var(--neon); color: #000; font-weight: bold; box-shadow: 0 0 20px var(--neon); }

        /* 左侧诊断数据流 */
        .terminal {
            position: absolute; left: 20px; top: 100px; width: 220px;
            font-family: 'Courier New', monospace; font-size: 10px; color: var(--neon);
            pointer-events: none; opacity: 0.7; z-index: 100;
        }

        /* 底部详情卡片 - 高级感滑入 */
        #detail-card {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 400px; background: rgba(0, 20, 10, 0.85); border: 1px solid var(--neon);
            padding: 25px; border-radius: 24px; backdrop-filter: blur(15px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200;
        }
        #detail-card.show { transform: translateX(-50%) translateY(0); }
        .card-title { color: var(--neon); font-size: 22px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .card-title::before { content: ''; width: 4px; height: 20px; background: var(--neon); }
        .card-body { font-size: 15px; line-height: 1.6; color: #ddd; }

        #output_canvas { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; }
        #input_video { display: none; }
        
        /* 全屏扫描动画 */
        .scanning-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(174, 227, 27, 0.1) 0%, transparent 50%, rgba(174, 227, 27, 0.1) 100%);
            background-size: 100% 10px; animation: scan-anim 3s linear infinite;
            pointer-events: none; z-index: 50; opacity: 0.3;
        }
        @keyframes scan-anim { from { background-position: 0 0; } to { background-position: 0 100%; } }
    </style>
</head>
<body>

<div class="header"><h1>拍一拍</h1></div>
<div class="scanning-overlay"></div>

<!-- 诊断面板 -->
<div class="symptom-panel">
    <div style="color:var(--neon); font-size:12px; margin-bottom:5px; opacity:0.6;">SELECT SYMPTOM</div>
    <div class="symptom-btn" onclick="selectSymptom('eye', this)">消除眼疲劳</div>
    <div class="symptom-btn" onclick="selectSymptom('head', this)">缓解头偏痛</div>
    <div class="symptom-btn" onclick="selectSymptom('nose', this)">感冒通鼻窍</div>
    <div class="symptom-btn" onclick="selectSymptom('face', this)">面部塑形</div>
    <div class="symptom-btn" onclick="selectSymptom('reset', this)" style="border-style:dashed; margin-top:20px;">重置全屏识别</div>
</div>

<!-- 实时数据流 -->
<div class="terminal" id="terminal">
    [ SYSTEM_INIT ]<br>
    > BIO_METRIC_SCAN: OK<br>
    > NEURAL_GRID: SYNCED...
</div>

<!-- 详情卡片 -->
<div id="detail-card">
    <div class="card-title" id="p-name">穴位名称</div>
    <div class="card-body">
        <div style="margin-bottom:10px;"><b style="color:var(--neon)">[ 导引定位 ]</b> <span id="p-loc"></span></div>
        <div><b style="color:var(--neon)">[ 智慧建议 ]</b> <span id="p-eff"></span></div>
    </div>
</div>

<video id="input_video" playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let selectedType = 'reset'; // 记录当前选中的病症
    let activeAcupoint = null;
    let lastResults = null;

    // 结构化穴位与病症关联
    const SYMPTOMS = {
        'eye': { points: ['攒竹', '鱼腰', '四白'], advise: '建议：闭目用食指指腹点按，每次3-5分钟，可迅速缓解视疲劳。' },
        'head': { points: ['太阳穴', '印堂', '神庭'], advise: '建议：按压太阳穴时顺时针揉动，配合印堂穴上推。' },
        'nose': { points: ['迎香穴', '印堂'], advise: '建议：针对鼻塞，迎香穴点按至有微热感为佳。' },
        'face': { points: ['地仓穴', '颊车穴', '巨髎'], advise: '建议：沿下颌线向上推按，有助于提升面部轮廓。' },
        'reset': { points: [], advise: '' }
    };

    const ACUPOINTS = [
        { type:'eye', name: "攒竹", index: 55, loc: "眉头凹陷处", eff: "消除视疲劳、明目" },
        { type:'eye', name: "鱼腰", index: 52, loc: "眉毛中心", eff: "缓解眼部肿痛" },
        { type:'eye', name: "四白", index: 101, loc: "瞳孔直下眶下孔", eff: "改善黑眼圈、美白" },
        { type:'head', name: "太阳穴", index: 21, loc: "眉尾外侧凹陷", eff: "缓解头痛、清脑" },
        { type:'head', name: "印堂", index: 9, loc: "两眉正中", eff: "安神醒脑" },
        { type:'head', name: "神庭", index: 10, loc: "发际正中直上", eff: "缓解眩晕" },
        { type:'nose', name: "迎香穴", index: 129, loc: "鼻翼旁0.5寸", eff: "通鼻窍、主治鼻炎" },
        { type:'face', name: "地仓穴", index: 61, loc: "口角旁0.4寸", eff: "紧致嘴角、改善歪斜" },
        { type:'face', name: "颊车穴", index: 132, loc: "下颌角前上方", eff: "瘦脸、缓解牙痛" }
    ];

    function selectSymptom(type, btn) {
        selectedType = type;
        // UI 切换
        document.querySelectorAll('.symptom-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        
        // 隐藏详情卡片
        document.getElementById('detail-card').classList.remove('show');
        
        // 模拟数据流
        const t = document.getElementById('terminal');
        t.innerHTML += `<br>> FOCUS_ON: ${type.toUpperCase()}...<br>> OPTIMIZING_CHANNELS...`;
        if(t.innerHTML.length > 500) t.innerHTML = t.innerHTML.slice(-300);
    }

    function onResults(results) {
        lastResults = results;
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.faceLandmarks) {
            drawCyberGrid(results.faceLandmarks);
            
            // 穴位过滤逻辑
            const pointsToShow = ACUPOINTS.filter(p => {
                if (selectedType === 'reset') return true; // 全显
                return SYMPTOMS[selectedType].points.includes(p.name);
            });

            pointsToShow.forEach(p => drawInteractivePoint(results.faceLandmarks[p.index], p));
        }
        canvasCtx.restore();
    }

    // 绘制高级感网格
    function drawCyberGrid(landmarks) {
        canvasCtx.beginPath();
        canvasCtx.strokeStyle = "rgba(174, 227, 27, 0.15)";
        canvasCtx.lineWidth = 0.5;
        const indices = [10, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 10];
        indices.forEach(idx => {
            const p = landmarks[idx];
            canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height);
        });
        canvasCtx.stroke();
    }

    // 绘制带涟漪动画的穴位
    function drawInteractivePoint(lm, data) {
        const x = lm.x * canvasElement.width;
        const y = lm.y * canvasElement.height;
        const time = Date.now() / 1000;

        // 基础准心
        canvasCtx.strokeStyle = varColor(data.name);
        canvasCtx.lineWidth = 2;
        
        // 涟漪动画 (只为推荐穴位增加)
        if (selectedType !== 'reset') {
            const radius = 10 + (time % 1) * 30;
            canvasCtx.beginPath();
            canvasCtx.arc(x, y, radius, 0, Math.PI * 2);
            canvasCtx.strokeStyle = `rgba(174, 227, 27, ${1 - (time % 1)})`;
            canvasCtx.stroke();
        }

        // 中心点
        canvasCtx.beginPath();
        canvasCtx.arc(x, y, 4, 0, Math.PI * 2);
        canvasCtx.fillStyle = varColor(data.name);
        canvasCtx.fill();

        // 标签
        canvasCtx.save();
        canvasCtx.translate(x, y);
        canvasCtx.scale(-1, 1);
        canvasCtx.fillStyle = "white";
        canvasCtx.font = "12px Monospace";
        canvasCtx.fillText(data.name, 12, 4);
        canvasCtx.restore();
    }

    function varColor(name) {
        if (selectedType === 'reset') return "#AEE31B";
        return SYMPTOMS[selectedType].points.includes(name) ? "#AEE31B" : "rgba(255,255,255,0.2)";
    }

    // 处理交互
    canvasElement.addEventListener('click', (e) => {
        if (!lastResults || !lastResults.faceLandmarks) return;
        const rect = canvasElement.getBoundingClientRect();
        const clickX = (rect.right - e.clientX) * (canvasElement.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvasElement.height / rect.height);

        ACUPOINTS.forEach(p => {
            const lm = lastResults.faceLandmarks[p.index];
            const dx = clickX - lm.x * canvasElement.width;
            const dy = clickY - lm.y * canvasElement.height;
            if (Math.sqrt(dx*dx + dy*dy) < 40) {
                activeAcupoint = p;
                showCard(p);
            }
        });
    });

    function showCard(p) {
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-loc').innerText = p.loc;
        // 拼接智能建议
        const advise = SYMPTOMS[selectedType]?.advise || "建议：每日点按2-3次，力度适中。";
        document.getElementById('p-eff').innerText = p.eff + "。" + advise;
        document.getElementById('detail-card').classList.add('show');
    }

    // 初始化模型
    const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
    holistic.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
    holistic.onResults(onResults);
    new Camera(videoElement, { onFrame: async () => await holistic.send({image: videoElement}), width: 1280, height: 720 }).start();
</script>
</body>
</html>
